name: Test Templates
on:
  push:
    branches: [master, main]
    paths:
      - "templates/**"
      - "formatters/**"
      - "flake-module.nix"
      - "flake.nix"
      - "tests/templates/**"
      - ".github/workflows/test-templates.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "templates/**"
      - "formatters/**"
      - "flake-module.nix"
      - "flake.nix"
      - "tests/templates/**"
      - ".github/workflows/test-templates.yml"
  workflow_dispatch:
jobs:
  test-minimal:
    name: Test Minimal Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      - name: Run minimal template test
        run: |
          echo "Testing minimal template on ${{ matrix.os }}"
          source ./tests/templates/wrapper.sh
          ./tests/templates/test-minimal.sh
        timeout-minutes: 10
  test-default:
    name: Test Default Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      - name: Run default template test
        run: |
          echo "Testing default template on ${{ matrix.os }}"
          source ./tests/templates/wrapper.sh
          ./tests/templates/test-default.sh
        timeout-minutes: 15
  test-complete:
    name: Test Complete Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      - name: Run complete template test
        run: |
          echo "Testing complete template on ${{ matrix.os }}"
          source ./tests/templates/wrapper.sh
          ./tests/templates/test-complete.sh
        timeout-minutes: 20
  integration-test:
    name: Integration Test - All Templates
    runs-on: ["self-hosted", "linux", "x64"]
    needs: [test-minimal, test-default, test-complete]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      - name: Run all template tests
        run: |
          echo "Running integration test for all templates"
          source ./tests/templates/wrapper.sh
          ./tests/run-all-tests.sh
        timeout-minutes: 30
  validate-formatters:
    name: Validate Formatter Configurations
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Check flake
        run: |
          echo "Checking flake configuration..."
          nix flake check --all-systems
        timeout-minutes: 10
