name: Test Templates

on:
  push:
    branches: [master, main]
    paths:
      - 'templates/**'
      - 'formatters/**'
      - 'flake-module.nix'
      - 'flake.nix'
      - 'tests/templates/**'
      - '.github/workflows/test-templates.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'templates/**'
      - 'formatters/**'
      - 'flake-module.nix'
      - 'flake.nix'
      - 'tests/templates/**'
      - '.github/workflows/test-templates.yml'
  workflow_dispatch:

jobs:
  test-minimal:
    name: Test Minimal Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      
      - name: Run minimal template test
        run: |
          echo "Testing minimal template on ${{ matrix.os }}"
          source ./tests/templates/test-wrapper.sh
          ./tests/templates/test-minimal.sh
        timeout-minutes: 10

  test-default:
    name: Test Default Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      
      - name: Run default template test
        run: |
          echo "Testing default template on ${{ matrix.os }}"
          source ./tests/templates/test-wrapper.sh
          ./tests/templates/test-default.sh
        timeout-minutes: 15

  test-complete:
    name: Test Complete Template
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      
      - name: Run complete template test
        run: |
          echo "Testing complete template on ${{ matrix.os }}"
          source ./tests/templates/test-wrapper.sh
          ./tests/templates/test-complete.sh
        timeout-minutes: 20

  integration-test:
    name: Integration Test - All Templates
    runs-on: ubuntu-latest
    needs: [test-minimal, test-default, test-complete]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Setup CI environment
        run: |
          ./tests/setup-ci.sh
      
      - name: Run all template tests
        run: |
          echo "Running integration test for all templates"
          source ./tests/templates/test-wrapper.sh
          ./tests/run-all-tests.sh
        timeout-minutes: 30

  validate-formatters:
    name: Validate Formatter Configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Check flake
        run: |
          echo "Checking flake configuration..."
          nix flake check --all-systems
        timeout-minutes: 10
      
      - name: Build formatter modules
        run: |
          echo "Building individual formatter modules..."
          for formatter in nix web python shell rust yaml markdown json misc; do
              echo "Building formatter module: $formatter"
              nix build .#formatterModules.$formatter --no-link
          done
        timeout-minutes: 10