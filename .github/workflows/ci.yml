name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test-templates:
    name: Test ${{ matrix.template }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        template: [minimal, default, complete]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: treefmt-full-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Run template test
        run: |
          chmod +x ./tests/templates/test-${{ matrix.template }}.sh
          ./tests/templates/test-${{ matrix.template }}.sh
        env:
          NIX_CONFIG: "accept-flake-config = true"
  flake-check:
    name: Flake Check
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: treefmt-full-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Check flake
        run: nix flake check
  formatter-isolation:
    name: Test Formatters in Isolation
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: treefmt-full-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Run formatter isolation tests
        run: |
          chmod +x ./tests/formatters/test-formatter-isolation.sh
          ./tests/formatters/test-formatter-isolation.sh
  all-tests:
    name: All Tests Suite
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: treefmt-full-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Run all tests
        run: |
          chmod +x ./tests/run-all-tests.sh
          ./tests/run-all-tests.sh
  nix-fmt-integration:
    name: Nix Fmt Integration Test
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: treefmt-full-flake
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Run nix fmt integration test
        run: |
          chmod +x ./tests/integration/test-nix-fmt.sh
          ./tests/integration/test-nix-fmt.sh
