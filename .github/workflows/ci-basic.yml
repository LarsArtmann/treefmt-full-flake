name: Basic CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  flake-check:
    name: Basic Flake Check
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Check flake outputs
        run: |
          nix flake show
          nix flake metadata
  test-local:
    name: Test with Local Path
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Test local template
        run: |
          chmod +x ./tests/test-local-template.sh
          ./tests/test-local-template.sh
  format-check:
    name: Format Check
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Check formatting
        run: |
          nix fmt -- --fail-on-change
